<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoPlatform</title>
    <link rel="stylesheet" href="/static/style.css?v=15">
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
    <header class="app-header">
        <span class="logo">AlgoPlatform</span>
        <nav>
            {% if user_id %}
            <span class="user-id">{{ user_id }}</span>
            {% endif %}
            <a href="/auth/logout" class="btn-ghost">Logout</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
